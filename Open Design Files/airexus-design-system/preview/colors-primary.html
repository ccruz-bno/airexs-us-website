<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview: Primary Colors</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1.5rem; padding: 2rem; }
    .swatch { border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .color { height: 120px; }
    .label { padding: 1rem; background: var(--bg-color); color: var(--text-color); font-size: 0.875rem; font-weight: 500; }
    .hex { display: block; font-family: monospace; color: var(--secondary-gray); font-size: 0.75rem; margin-top: 0.25rem; }
    h1 { padding: 0 2rem; }
  </style>
</head>
<body>
  <h1>Primary Colors</h1>
  <div class="grid">
    <div class="swatch">
      <div class="color" style="background-color: var(--primary-yellow)"></div>
      <div class="label">Primary Yellow <span class="hex">#FFE900</span></div>
    </div>
    <div class="swatch">
      <div class="color" style="background-color: var(--primary-cyan)"></div>
      <div class="label">Primary Cyan <span class="hex">#2B99D1</span></div>
    </div>
    <div class="swatch">
      <div class="color" style="background-color: var(--primary-black)"></div>
      <div class="label">Primary Black <span class="hex">#0C1115</span></div>
    </div>
    <div class="swatch">
      <div class="color" style="background-color: var(--primary-white); border: 1px solid var(--secondary-dark2)"></div>
      <div class="label">Primary White <span class="hex">#F1F1F1</span></div>
    </div>
  </div>
  
  <h1>Gradients</h1>
  <div class="grid">
    <div class="swatch">
      <div class="color" style="background: var(--gradient-yellow-cyan)"></div>
      <div class="label">Yellow-Cyan Gradient <span class="hex">linear-gradient(90deg, #FFE900, #2B99D1)</span></div>
    </div>
  </div>
</body>
</html>
