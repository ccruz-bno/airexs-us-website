<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview: Brand Assets</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body { padding: 2rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem; }
    .asset-card { padding: 1.5rem; border: 1px solid var(--secondary-gray); border-radius: 8px; text-align: center; }
    .asset-card.dark { background-color: var(--secondary-dark1); color: var(--primary-white); border: none; }
    .asset-card img { max-width: 100%; height: auto; max-height: 120px; object-fit: contain; }
    .label { margin-top: 1rem; font-size: 0.875rem; font-weight: 500; font-family: monospace; }
  </style>
</head>
<body>
  <h1>Brand Assets</h1>
  
  <h2>Imagotipos</h2>
  <div class="grid">
    <div class="asset-card">
      <img src="../assets/Imagotipo-Color-1.svg" alt="Imagotipo Color 1">
      <div class="label">Imagotipo-Color-1.svg</div>
    </div>
    <div class="asset-card dark">
      <img src="../assets/Imagotipo-Blanco.svg" alt="Imagotipo Blanco">
      <div class="label">Imagotipo-Blanco.svg</div>
    </div>
    <div class="asset-card">
      <img src="../assets/Imagotipo-Negro.svg" alt="Imagotipo Negro">
      <div class="label">Imagotipo-Negro.svg</div>
    </div>
  </div>

  <h2 style="margin-top: 3rem;">Imagotipos con Descripción</h2>
  <div class="grid">
    <div class="asset-card">
      <img src="../assets/Imagotipo-_-Descripcio_n-Color-1.svg" alt="Imagotipo Descripcion Color 1">
      <div class="label">Imagotipo-_-Descripcio_n-Color-1.svg</div>
    </div>
    <div class="asset-card dark">
      <img src="../assets/Imagotipo-_-Descripcio_n-Blanco.svg" alt="Imagotipo Descripcion Blanco">
      <div class="label">Imagotipo-_-Descripcio_n-Blanco.svg</div>
    </div>
  </div>

  <h2 style="margin-top: 3rem;">Isotipos</h2>
  <div class="grid">
    <div class="asset-card">
      <img src="../assets/Isotipo-Color-1.svg" alt="Isotipo Color 1">
      <div class="label">Isotipo-Color-1.svg</div>
    </div>
    <div class="asset-card dark">
      <img src="../assets/Isotipo-Blanco.svg" alt="Isotipo Blanco">
      <div class="label">Isotipo-Blanco.svg</div>
    </div>
  </div>

</body>
</html>
